name: SDK CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run for the same ref so a quick follow-up push doesn't
# queue behind a stale build.
concurrency:
  group: sdk-ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Jobs run in two waves:
#
#  Wave 1 (all parallel):
#    python        [ubuntu, macos, windows] × [3.11, 3.12]
#    rust-test     [ubuntu, macos, windows]
#    rust-wasm-build  ubuntu only (output is OS-independent; uploads artifact)
#    js            [ubuntu, macos, windows]
#    go-test       [ubuntu, macos, windows]
#    go-wasm-build    ubuntu only
#    dart          [ubuntu, macos, windows]  ← needs libwasmtime (fetch script)
#    version-consistency  ubuntu only
#
#  Wave 2 (after rust-wasm-build):
#    e2e           [ubuntu, macos, windows]  ← downloads wasm artifact; needs libwasmtime
#
# The fetch-wasmtime-libs.sh script already handles all three OS variants
# (macOS arm64/x64, Linux x64/arm64, Windows x64). Windows runners invoke the
# script via Git Bash, which is present on all windows-latest GitHub-hosted
# runners (MINGW64 environment).
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Python SDK ──────────────────────────────────────────────────────────────
  python:
    name: Python SDK (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: sdks/python
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK + dev dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest --cov=hellohq_plugin_sdk --cov-report=term-missing

  # ── Rust SDK — unit tests (all OS) ─────────────────────────────────────────
  rust-test:
    name: Rust SDK — unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust

      - run: cargo test

  # ── Rust SDK — wasm32 build + examples (Linux only) ────────────────────────
  # The wasm32-unknown-unknown output is identical regardless of the build host.
  # Building on Linux once avoids paying macOS (10×) and Windows (2×) rates.
  # The artifact is uploaded so the e2e matrix jobs can download it directly
  # without rebuilding.
  rust-wasm-build:
    name: Rust SDK — wasm32 build + examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            sdks/rust
            examples/allocation-lens
            examples/portfolio_overview
            examples/component-quickstart
            examples/component-quickstart/inference

      - name: Install wasm-tools (Component Model toolchain)
        run: |
          curl -L https://github.com/bytecodealliance/wasm-tools/releases/download/v1.252.0/wasm-tools-1.252.0-x86_64-linux.tar.gz \
            | tar xz -C /tmp
          echo "/tmp/wasm-tools-1.252.0-x86_64-linux" >> "$GITHUB_PATH"

      - name: Build SDK (wasm32)
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: sdks/rust

      - name: Build allocation-lens example
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: examples/allocation-lens

      - name: Build portfolio_overview example
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: examples/portfolio_overview

      # Package the core module into a Component (the hellohq:plugin@0.1.0 ABI
      # the host loads), in place — matches what `hqplugin build` produces. The
      # e2e matrix downloads this and runs it through `hqplugin test`.
      - name: Componentize portfolio_overview
        working-directory: examples/portfolio_overview
        run: |
          out=target/wasm32-unknown-unknown/release/portfolio_overview.wasm
          wasm-tools component new "$out" -o "$out"
          wasm-tools component wit "$out" | grep -q 'export hellohq:plugin/guest@0.1.0;'

      # ── Component Model: build the quickstart examples to components and
      #    assert their shape (canonical hellohq:plugin@0.1.0, no stray wasi).
      - name: Build component-quickstart (sync) -> component
        working-directory: examples/component-quickstart
        run: |
          ./build.sh
          wit=$(wasm-tools component wit component_quickstart.component.wasm)
          echo "$wit"
          echo "$wit" | grep -q 'export hellohq:plugin/guest@0.1.0;' || { echo "missing guest export"; exit 1; }
          if echo "$wit" | grep -qi 'wasi:'; then echo "stray wasi import"; exit 1; fi

      - name: Build component-quickstart (streaming inference) -> component
        working-directory: examples/component-quickstart/inference
        run: |
          ./build.sh
          wit=$(wasm-tools component wit component_quickstart_inference.component.wasm)
          echo "$wit"
          echo "$wit" | grep -q 'import hellohq:plugin/inference@0.1.0;' || { echo "missing inference import"; exit 1; }
          if echo "$wit" | grep -qi 'wasi:'; then echo "stray wasi import"; exit 1; fi

      # Upload the reference wasm for the e2e matrix jobs.
      - uses: actions/upload-artifact@v4
        with:
          name: portfolio-overview-wasm
          path: examples/portfolio_overview/target/wasm32-unknown-unknown/release/portfolio_overview.wasm
          retention-days: 1

  # ── JS / TypeScript SDK (all OS) ───────────────────────────────────────────
  js:
    name: JS/TS SDK (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: sdks/js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdks/js/package-lock.json

      - run: npm ci
      - run: npm run build

  # ── JS SDK — componentize the example (Linux only) ─────────────────────────
  # jco/componentize-js embeds a JS engine; the built component is
  # OS-independent, so build once on Linux. Asserts the component exports
  # `guest` and imports the hellohq:plugin/* subset (+ the wasi:* the engine
  # pulls in — see sdks/js/README.md "JS plugins require host WASI").
  js-component-build:
    name: JS SDK — example component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wasm-tools (Component Model toolchain)
        uses: bytecodealliance/actions/wasm-tools/setup@v1

      - name: Build the JS SDK
        working-directory: sdks/js
        run: |
          npm ci
          npm run build

      - name: Build component-quickstart-js -> component
        working-directory: examples/component-quickstart-js
        run: |
          npm ci
          ./build.sh
          wit=$(wasm-tools component wit component_quickstart_js.component.wasm)
          echo "$wit"
          echo "$wit" | grep -q 'export hellohq:plugin/guest@0.1.0'        || { echo "missing guest export"; exit 1; }
          echo "$wit" | grep -q 'import hellohq:plugin/workspace@0.1.0'     || { echo "missing workspace import"; exit 1; }
          echo "$wit" | grep -q 'import hellohq:plugin/storage@0.1.0'       || { echo "missing storage import"; exit 1; }
          echo "$wit" | grep -q 'import wasi:'                              || { echo "expected wasi imports (embedded JS engine)"; exit 1; }

  # ── Go SDK — unit tests (all OS) ───────────────────────────────────────────
  go-test:
    name: Go SDK — unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sdks/go/go.sum

      - run: go test ./...

  # ── Go SDK — wasip1 build (Linux only) ─────────────────────────────────────
  go-wasm-build:
    name: Go SDK — wasip1 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sdks/go/go.sum

      - run: GOOS=wasip1 GOARCH=wasm go build -o /tmp/go-plugin.wasm .
        working-directory: sdks/go

  # ── Go SDK — Component Model example (Linux only) ──────────────────────────
  # TinyGo's wasip2 target builds a Component Model component directly. Unlike
  # the Rust no_std path, TinyGo's runtime imports wasi:* — see
  # sdks/go/README.md "The host needs WASI 0.2 for Go plugins".
  go-component-build:
    name: Go SDK — example component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sdks/go/go.sum

      - name: Install TinyGo
        uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: '0.41.1'

      - name: Install wasm-tools (Component Model toolchain)
        uses: bytecodealliance/actions/wasm-tools/setup@v1

      - name: Build component-quickstart-go -> component
        working-directory: examples/component-quickstart-go
        run: |
          ./build.sh
          wit=$(wasm-tools component wit component_quickstart_go.component.wasm)
          echo "$wit"
          echo "$wit" | grep -q 'export hellohq:plugin/guest@0.1.0'    || { echo "missing guest export"; exit 1; }
          echo "$wit" | grep -q 'import hellohq:plugin/workspace@0.1.0' || { echo "missing workspace import"; exit 1; }
          echo "$wit" | grep -q 'import hellohq:plugin/storage@0.1.0'   || { echo "missing storage import"; exit 1; }
          echo "$wit" | grep -q 'import hellohq:plugin/events@0.1.0'    || { echo "missing events import"; exit 1; }
          echo "$wit" | grep -q 'import hellohq:plugin/log@0.1.0'       || { echo "missing log import"; exit 1; }
          echo "$wit" | grep -q 'import wasi:'                          || { echo "expected wasi imports (TinyGo runtime)"; exit 1; }
          # SA3 (doc 59): a plugin component must NEVER import wasi:sockets —
          # that is ambient network that would bypass the host's permission-gated
          # http_request bridge. This is a hard gate (the Rust world denies it
          # structurally; enforce it for the Go/TinyGo path too).
          #
          # wasi:filesystem is a deliberate exception: TinyGo unavoidably pulls
          # wasi:filesystem/{preopens,types} for fd-based stdio, so its mere
          # presence in the import list is not ambient FS. The host neuters it by
          # granting ZERO preopens (get-directories returns nothing) — a
          # host-enforced denial tracked for hellohq-wasm-runtime. Network has no
          # such excuse, so only sockets is gated here.
          if echo "$wit" | grep -Eqi 'import[[:space:]]+wasi:sockets'; then
            echo "::error::SA3: component imports wasi:sockets — ambient network is forbidden for plugins (use the host http_request bridge)"; exit 1
          fi
          if echo "$wit" | grep -Eqi 'import[[:space:]]+wasi:filesystem'; then
            echo "::notice::wasi:filesystem present (TinyGo stdio) — host must grant zero preopens; see doc 59 SA3."
          fi
          wasm-tools validate component_quickstart_go.component.wasm

  # ── Dart CLI + Mock Host (Linux, macOS, Windows) ────────────────────────────
  # libwasmtime is fetched via scripts/fetch-wasmtime-libs.sh, which handles:
  #   Linux x64     → third_party/wasmtime/linux-x64/libwasmtime.so
  #   macOS arm64   → third_party/wasmtime/macos-arm64/libwasmtime.dylib
  #   macOS x64     → third_party/wasmtime/macos-x64/libwasmtime.dylib
  #   Windows x64   → third_party/wasmtime/windows-x64/wasmtime.dll
  #
  # Windows notes:
  #   - Long-path git config prevents MAX_PATH failures in deep pub-cache trees.
  #   - PUB_CACHE is moved to C:\pc (short root) as an additional MAX_PATH guard.
  #   - The fetch script runs under Git Bash (MINGW64), which is always present
  #     on windows-latest GitHub-hosted runners.
  #   - CliWasmtimeLib walks upward from CWD to find the DLL by relative path,
  #     so no PATH manipulation is needed.
  dart:
    name: Dart CLI + Mock Host (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Enable git long paths (Windows MAX_PATH workaround)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
        shell: bash

      - uses: actions/checkout@v4

      - name: Use short PUB_CACHE on Windows (MAX_PATH workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\pc | Out-Null
          "PUB_CACHE=C:\pc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.4'

      # The CLI's sidecar tests (test/sidecar_test.dart) spawn a Python sidecar,
      # so Python must be available on the runner.
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Cache Dart pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            C:\pc
          key: pub-dart-${{ matrix.os }}-${{ hashFiles('mock-host/pubspec.yaml', 'cli/pubspec.yaml') }}
          restore-keys: pub-dart-${{ matrix.os }}-

      - name: Cache Wasmtime native lib
        id: cache-wasmtime
        uses: actions/cache@v4
        with:
          path: third_party/wasmtime
          key: wasmtime-${{ matrix.os }}-${{ hashFiles('scripts/fetch-wasmtime-libs.sh') }}

      - name: Fetch Wasmtime native lib
        if: steps.cache-wasmtime.outputs.cache-hit != 'true'
        run: bash scripts/fetch-wasmtime-libs.sh
        shell: bash

      # The CLI build tests (test/build_test.dart, test/test_cmd_test.dart) invoke
      # `cargo build --target wasm32-unknown-unknown`. Cargo is pre-installed on
      # GitHub runners but the wasm32-unknown-unknown target is not — add it so
      # the tests pass instead of failing with exit code 101 (target not found).
      - name: Install wasm32-unknown-unknown Rust target (for CLI build tests)
        run: rustup target add wasm32-unknown-unknown
        shell: bash

      # `hqplugin build` (exercised by test_cmd_test + build_test) packages the
      # core module into a Component via `wasm-tools component new`.
      - name: Install wasm-tools (Component Model toolchain)
        uses: bytecodealliance/actions/wasm-tools/setup@v1

      - name: dart pub get — mock-host
        run: dart pub get
        working-directory: mock-host

      - name: dart test — mock-host
        run: dart test
        working-directory: mock-host

      - name: dart pub get — cli
        run: dart pub get
        working-directory: cli

      - name: dart test — cli
        run: dart test
        working-directory: cli

  # ── E2E: run portfolio_overview.wasm through hqplugin CLI (all OS) ─────────
  # Downloads the pre-built wasm artifact from rust-wasm-build (Linux) so we
  # don't pay Rust compile costs on macOS/Windows. Wasmtime is fetched per-OS.
  #
  # Uses a workspace-relative download path (_wasm/) so the path is always a
  # simple relative string — no OS-specific temp directory quoting needed.
  e2e:
    name: E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [rust-wasm-build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Enable git long paths (Windows MAX_PATH workaround)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true
        shell: bash

      - uses: actions/checkout@v4

      - name: Use short PUB_CACHE on Windows (MAX_PATH workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\pc | Out-Null
          "PUB_CACHE=C:\pc" | Out-File -FilePath $env:GITHUB_ENV -Append

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.4'

      # Tier-1 sidecar e2e (below) spawns a Python plugin.
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Cache Dart pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            C:\pc
          key: pub-dart-${{ matrix.os }}-${{ hashFiles('mock-host/pubspec.yaml', 'cli/pubspec.yaml') }}
          restore-keys: pub-dart-${{ matrix.os }}-

      - name: Cache Wasmtime native lib
        id: cache-wasmtime
        uses: actions/cache@v4
        with:
          path: third_party/wasmtime
          key: wasmtime-${{ matrix.os }}-${{ hashFiles('scripts/fetch-wasmtime-libs.sh') }}

      - name: Fetch Wasmtime native lib
        if: steps.cache-wasmtime.outputs.cache-hit != 'true'
        run: bash scripts/fetch-wasmtime-libs.sh
        shell: bash

      - name: dart pub get — mock-host
        run: dart pub get
        working-directory: mock-host

      - name: dart pub get — cli
        run: dart pub get
        working-directory: cli

      # Download into _wasm/ (workspace-relative) so the path is a plain
      # relative string that works identically on all three OSes.
      - name: Download portfolio_overview.wasm
        uses: actions/download-artifact@v4
        with:
          name: portfolio-overview-wasm
          path: _wasm

      - name: Run portfolio_overview through hqplugin test (Tier-2 Wasm)
        run: |
          dart run cli/bin/hqplugin.dart test \
            --wasm _wasm/portfolio_overview.wasm \
            --grant read:portfolio_names
        shell: bash

      # No explicit SDK install needed: the hqplugin CLI auto-discovers
      # sdks/python by walking up from the plugin file and injects it into
      # PYTHONPATH before spawning the sidecar process (see _locatePythonSdk in
      # cli/lib/src/test_cmd.dart). A `uv pip install --system` here would install
      # into a different Python than the one the sidecar spawns, so it cannot help.

      # Tier-1 sidecar e2e: spawns the CPython plugin via the CLI and
      # round-trips a plugin:storage call.
      - name: Run notes-keeper through hqplugin test (Tier-1 sidecar)
        run: |
          dart run cli/bin/hqplugin.dart test \
            --sidecar examples/notes-keeper \
            --grant plugin:storage
        shell: bash

  # ── Protocol version consistency (pure text; Linux only) ───────────────────
  version-consistency:
    name: Protocol version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare PROTOCOL_VERSION across all SDKs
        shell: bash
        run: |
          PY=$(grep 'PROTOCOL_VERSION' sdks/python/hellohq_plugin_sdk/protocol.py | grep -oP '"\K[^"]+(?=")')
          RS=$(grep 'PROTOCOL_VERSION' sdks/rust/src/lib.rs              | grep -oP '"\K[^"]+(?=")')
          JS=$(grep 'PROTOCOL_VERSION' sdks/js/src/index.ts              | grep -oP '"\K[^"]+(?=")')
          GO=$(grep 'ProtocolVersion'  sdks/go/sdk.go                    | grep -oP '"\K[^"]+(?=")')
          echo "Python=$PY  Rust=$RS  JS=$JS  Go=$GO"
          for V in "$RS" "$JS" "$GO"; do
            if [ "$V" != "$PY" ]; then
              echo "❌ PROTOCOL_VERSION mismatch: $V != $PY"
              exit 1
            fi
          done
          echo "✅ All SDKs agree on PROTOCOL_VERSION=$PY"
